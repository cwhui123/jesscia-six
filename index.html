<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="utf-8" />
  <title>六合彩分析面板（Excel 驅動）</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.19.3/dist/xlsx.full.min.js"></script>
  <style>
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Noto Sans TC", sans-serif; margin: 24px; }
    h1,h2{margin-top:24px}
    table{border-collapse:collapse;width:100%;margin-top:12px}
    th,td{border:1px solid #ddd;padding:6px 8px;text-align:center;font-size:14px}
    th{background:#f5f5f5}
    .hint{color:#b45309;background:#fff7ed;border:1px solid #fed7aa;padding:10px;border-radius:8px;margin-top:12px}
  </style>
</head>
<body>

<h1>六合彩分析面板</h1>
<p id="last-update">資料載入中…</p>

<h2>同期號碼組合（含特別號｜最近200期）</h2>

<table id="pair-table">
  <thead>
    <tr>
      <th>排行</th>
      <th>號碼對</th>
      <th>出現次數</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<div id="fetch-error" class="hint" style="display:none"></div>

<script>
(async () => {
  const status = document.getElementById('last-update');
  const errorBox = document.getElementById('fetch-error');

  try {
    const resp = await fetch('marksix_updated_200pair_analysis.xlsx', { cache: 'no-store' });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);

    const buf = await resp.arrayBuffer();
    const wb = XLSX.read(buf, { type: 'array' });

    const pairSheet = wb.Sheets['同期號碼組合（含特別號）'];
    const metaSheet = wb.Sheets['更新資訊'];

    if (!pairSheet) throw new Error('Missing sheet: 同期號碼組合（含特別號）');

    if (metaSheet) {
      const meta = XLSX.utils.sheet_to_json(metaSheet, { header: 1 });
      const row = meta.find(r => r[0] === '最後更新時間（HKT)');
      status.textContent = row ? `最後更新時間（香港時間）：${row[1]}` : '資料已載入';
    } else {
      status.textContent = '資料已載入';
    }

    const pairs = XLSX.utils.sheet_to_json(pairSheet);
    const tbody = document.querySelector('#pair-table tbody');
    tbody.innerHTML = '';

    pairs.forEach((r, i) => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${i + 1}</td>
        <td>${r['同期兩個號碼（含特別號｜最近200期）']}</td>
        <td>${r['出現次數']}</td>
      `;
      tbody.appendChild(tr);
    });

  } catch (err) {
    console.error(err);
    status.textContent = '⚠️ 無法載入資料';
    errorBox.style.display = 'block';
    errorBox.innerHTML = `
      <b>無法載入 Excel 檔案</b><br/>
      請確認：<br/>
      1️⃣ 以 <b>HTTP</b> 方式開啟（GitHub Pages 或 http://localhost）<br/>
      2️⃣ <code>marksix_updated_200pair_analysis.xlsx</code> 與 <code>index.html</code> 在同一層<br/>
    `;
  }
})();
</script>

</body>
</html>
